<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Login</title>

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:white;
      padding:40px;
      width:350px;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      margin-bottom:20px;
    }

    button{
      width:100%;
      padding:12px;
      background:#e53935;
      color:white;
      border:none;
      cursor:pointer;
    }

    #message{
      text-align:center;
      margin-top:15px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="login-box">

    <h2>Admin Login</h2>

    <form id="loginForm">

      <input
        type="text"
        id="username"
        placeholder="Username"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

    <p id="message"></p>

  </div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  try {

    const response = await fetch(
      "http://localhost:5000/api/auth/login",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          username,
          password
        })
      }
    );

    const data = await response.json();

    if (response.ok) {

      // SAVE TOKEN
      localStorage.setItem(
        "token",
        data.token
      );

      document.getElementById("message").innerHTML =
        "✅ Login successful";

      // REDIRECT
      setTimeout(() => {

        window.location.href =
          "add-property.html";

      }, 1000);

    } else {

      document.getElementById("message").innerHTML =
        "❌ " + data.message;

    }

  } catch (error) {

    console.log(error);

    document.getElementById("message").innerHTML =
      "❌ Server error";

  }

});

</script>

</body>
</html>
